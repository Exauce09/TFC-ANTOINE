<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Shortlist</title></head>
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto;">
  <div style="background: #166534; color: white; padding: 20px; text-align: center;">
    <h1>{{ company }}</h1>
  </div>
  <div style="padding: 24px;">
    <p>Bonjour <strong>{{ candidate_name }}</strong>,</p>
    <p>Félicitations ! Votre profil a été retenu pour la suite du processus de recrutement pour le poste de <strong>{{ job_title }}</strong>.</p>
    <p>Notre équipe vous contactera prochainement pour les prochaines étapes.</p>
    <p>Cordialement,<br>L'équipe RH — {{ company }}</p>
  </div>
</body>
</html>
